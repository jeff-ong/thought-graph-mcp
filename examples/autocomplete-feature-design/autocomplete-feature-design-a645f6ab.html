<script>
const SESSION = {"id":"a645f6ab-fbfa-4b41-875a-3d5a13b3d780","title":"Autocomplete feature design","problem":"Design an autocomplete feature: as a user types into an input, show ranked suggestions that can be selected via keyboard or mouse. Needs to cover data source, matching/ranking, frontend UX, performance/latency, and accessibility.","nodes":[{"id":"n1","title":"Problem","content":"Design an autocomplete feature: as a user types into an input, show ranked suggestions that can be selected via keyboard or mouse. Needs to cover data source, matching/ranking, frontend UX, performance/latency, and accessibility.","type":"root","parents":[],"status":"active","createdAt":"2026-06-30T03:47:56.253Z"},{"id":"n2","title":"Data source & indexing","content":"Where do suggestions come from and how are they stored for fast lookup? Options: static client-side list, server-side search endpoint, or hybrid (cache popular terms client-side, fall back to server). Index structure matters: trie/prefix-tree for prefix matching, inverted index for substring/fuzzy, or a search service (Elasticsearch/Typesense/Algolia).","type":"subproblem","parents":["n1"],"status":"active","createdAt":"2026-06-30T03:48:01.162Z"},{"id":"n3","title":"Matching & ranking","content":"How candidates are matched against the query and ordered. Matching: prefix vs substring vs fuzzy (typo-tolerant, edit distance). Ranking signals: lexical relevance, popularity/frequency, recency, personalization (user history), and business boosts. Need a deterministic, explainable scoring function and a cap on returned results (e.g. top 8-10).","type":"subproblem","parents":["n1"],"status":"active","createdAt":"2026-06-30T03:48:03.926Z"},{"id":"n4","title":"Frontend UX & interaction","content":"The visible behavior: dropdown listbox under the input, keyboard nav (arrow up/down, Enter to select, Esc to dismiss, Tab), mouse hover/click, highlighting the matched substring, empty/no-results state, loading state, and selection behavior (fill input, fire onChange, optionally navigate). Also debounce of input and minimum trigger length.","type":"subproblem","parents":["n1"],"status":"active","createdAt":"2026-06-30T03:48:07.277Z"},{"id":"n5","title":"Performance & latency","content":"Perceived speed is the make-or-break factor. Concerns: debouncing keystrokes (~150ms), request cancellation for stale responses (race conditions), client-side caching of prior queries, request coalescing, and keeping p95 round-trip under ~100-200ms. Out-of-order responses must never overwrite a newer query's results.","type":"subproblem","parents":["n1"],"status":"active","createdAt":"2026-06-30T03:48:10.988Z"},{"id":"n6","title":"Accessibility","content":"Must follow the WAI-ARIA combobox pattern so screen readers and keyboard-only users work. role=combobox on input with aria-expanded, aria-controls, aria-activedescendant pointing at the active option; the list is role=listbox with role=option children; announce result counts via an aria-live region. This is non-optional for a production input.","type":"subproblem","parents":["n1"],"status":"active","createdAt":"2026-06-30T03:48:13.863Z"},{"id":"n7","title":"H1: Client-side only","content":"Ship the full suggestion list to the browser, match locally with a trie. Pros: zero network latency, works offline, trivial infra. Cons: only viable for small, static datasets (≤ a few thousand items, ≤ ~1MB); no personalization; payload grows with data.","type":"hypothesis","parents":["n2"],"status":"active","confidence":0.5,"createdAt":"2026-06-30T03:48:20.122Z"},{"id":"n8","title":"H2: Server endpoint","content":"A /suggest?q= endpoint backed by a search service (Typesense/Elasticsearch/Algolia) or a DB prefix index. Pros: scales to millions of items, supports fuzzy + personalization + fresh data. Cons: network latency per keystroke, infra + cost, must handle race conditions and rate limiting.","type":"hypothesis","parents":["n2"],"status":"active","confidence":0.6,"createdAt":"2026-06-30T03:48:23.418Z"},{"id":"n9","title":"H3: Hybrid","content":"Server endpoint as source of truth, but cache the top-N popular queries and the user's recent selections client-side. Serve instant results from cache, fetch server results in parallel, merge. Pros: instant feel for common cases, scales, personalized. Cons: more complex, cache invalidation/merge logic.","type":"hypothesis","parents":["n2"],"status":"active","confidence":0.7,"createdAt":"2026-06-30T03:48:25.861Z"},{"id":"n10","title":"Eval: pick by dataset size","content":"The choice is dominated by dataset size and need for freshness/personalization. Decision rule: ≤ ~2k static items → H1 (client-side trie). Large/dynamic/personalized → H3 hybrid, which subsumes H2's endpoint while keeping the instant feel of H1. Pure H2 is the simplest scalable baseline if caching complexity isn't yet justified. Recommend H3 as the target architecture, implemented incrementally starting from H2.","type":"evaluation","parents":["n7","n8","n9"],"status":"active","confidence":0.75,"createdAt":"2026-06-30T03:48:32.083Z"},{"id":"n11","title":"Ranking scoring function","content":"score = w1·matchQuality + w2·log(popularity) + w3·recencyDecay + w4·personalBoost. matchQuality favors prefix > word-boundary > substring > fuzzy; exact match floats to top. Tie-break by popularity then alphabetical for determinism. Apply typo tolerance (edit distance ≤1 for ≥4-char tokens) only when strict matching yields few results. Cap at top 8.","type":"evidence","parents":["n3"],"status":"active","confidence":0.7,"createdAt":"2026-06-30T03:48:36.890Z"},{"id":"n12","title":"Race-condition handling","content":"Each request carries a monotonically increasing seq (or use AbortController to cancel in-flight requests on new keystroke). Only apply a response if its seq is the latest dispatched; drop stale ones. Combine with a 150ms debounce and a min query length of 1-2 chars. Cache results keyed by normalized query string so backspacing is instant. This single mechanism is the highest-leverage correctness fix.","type":"evidence","parents":["n5"],"status":"active","confidence":0.85,"createdAt":"2026-06-30T03:48:39.661Z"},{"id":"n13","title":"ARIA combobox contract","content":"Input: role=combobox, aria-expanded, aria-controls=listId, aria-autocomplete=list, aria-activedescendant=activeOptionId. List: role=listbox id=listId. Each item: role=option, unique id, aria-selected on the active one. A visually-hidden aria-live=polite region announces \"N results available\". Arrow keys move aria-activedescendant WITHOUT moving DOM focus (focus stays in input). Esc collapses; Enter commits the active option.","type":"evidence","parents":["n6"],"status":"active","confidence":0.9,"createdAt":"2026-06-30T03:48:43.144Z"},{"id":"n14","title":"Integrated design","content":"A self-contained <Autocomplete> component owns input state, debounce, request seq/abort, an LRU query cache, and keyboard/ARIA state. It calls a pluggable suggestionSource(query, signal) — backed locally by a trie (H1) or by /suggest (H2/H3) depending on dataset. Source returns pre-ranked top-8 results. Component renders the ARIA combobox, handles selection (fill + onSelect callback), and degrades gracefully (no-results, error, loading). This cleanly separates the four concerns and lets the backend evolve without UI changes.","type":"conclusion","parents":["n10","n11","n12","n13","n4"],"status":"active","confidence":0.8,"createdAt":"2026-06-30T03:48:49.871Z"}],"createdAt":"2026-06-30T03:47:56.253Z","updatedAt":"2026-06-30T03:49:03.012Z","finalAnswer":"Autocomplete design — a single <Autocomplete> component over a pluggable suggestion source.\n\nARCHITECTURE (data source)\n- Decision rule by dataset: ≤ ~2k static items → ship to client, match with a trie (zero latency). Large/dynamic/personalized → server /suggest endpoint backed by a search service (Typesense/Elasticsearch/Algolia) or DB prefix index. Best target: HYBRID — server is source of truth, but cache top-N popular queries + the user's recent picks client-side for an instant feel. Start with the plain server endpoint and add the cache layer when justified.\n- The UI talks to one interface: suggestionSource(query, signal) -> ranked top-8. Swapping local-trie vs server doesn't change the component.\n\nMATCHING & RANKING\n- Match priority: exact > prefix > word-boundary > substring > fuzzy (edit distance ≤1, only for ≥4-char tokens and only when strict matching is thin).\n- score = w1·matchQuality + w2·log(popularity) + w3·recencyDecay + w4·personalBoost. Deterministic tie-break: popularity, then alphabetical. Cap results at ~8.\n\nPERFORMANCE (the make-or-break part)\n- Debounce keystrokes ~150ms; min query length 1–2.\n- Race safety: tag each request with an increasing seq (or AbortController) and apply only the latest response; drop stale ones — this prevents out-of-order results clobbering newer queries.\n- LRU cache keyed by normalized query so backspacing/repeat queries are instant. Target p95 round-trip <100–200ms.\n\nFRONTEND UX\n- Dropdown listbox under the input; highlight the matched substring. Keyboard: ↑/↓ move active option, Enter commits, Esc closes, Tab/blur dismisses; mouse hover + click. Explicit loading, no-results, and error states. Selection fills the input and fires onSelect.\n\nACCESSIBILITY (WAI-ARIA combobox, non-optional)\n- Input: role=combobox, aria-expanded, aria-controls, aria-autocomplete=list, aria-activedescendant.\n- List: role=listbox; items role=option with aria-selected on the active one.\n- Arrow keys move aria-activedescendant while DOM focus STAYS in the input; a visually-hidden aria-live=polite region announces \"N results available\".\n\nThe four concerns stay decoupled: backend ranking/source can evolve independently of the accessible, race-safe UI component."};
</script>
